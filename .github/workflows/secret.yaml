name: sal secret ci

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: use secret
        run: echo "The secret value is ${{ secrets.MY_SECRET }}"

      - name: use secret as env var
        run: echo "The secret value is $MY_SECRET"
        env:
         MY_SECRET: ${{ secrets.MY_SECRET }}